name: Fetch Events Daily

on:
  schedule:
    # Every day at 8:00 AM CET (= 7:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch events via Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_events.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json
          git diff --cached --quiet || git commit -m "chore: update events $(date +'%Y-%m-%d')"
          git push
